name: Step 2 - Docker Build and Push

on:
  push:
    branches: [main]
    paths:
      - "books-app/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./books-app/backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/books-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./books-app/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/books-frontend:latest

      - name: Send Telegram notification on Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ *Docker Build Succeeded!* %0A🐳 Project: Books App %0A📦 Images pushed to Docker Hub: %0A  • ${{ secrets.DOCKERHUB_USERNAME }}/books-backend:latest %0A  • ${{ secrets.DOCKERHUB_USERNAME }}/books-frontend:latest %0A👤 User: ${{ github.actor }}" \
            -d parse_mode="Markdown"

      - name: Send Telegram notification on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ *Docker Build Failed!* %0A⚠️ Check GitHub Actions logs: https://github.com/${{ github.repository }}/actions" \
            -d parse_mode="Markdown"
