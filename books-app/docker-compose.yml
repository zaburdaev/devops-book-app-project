services:
  db:
    image: postgres:16-alpine
    container_name: booksdb
    environment:
      POSTGRES_DB: booksdb
      POSTGRES_USER: booksuser
      POSTGRES_PASSWORD: bookspass
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksuser -d booksdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: oskalibriary/books-backend:latest
    container_name: books-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booksdb
      DB_USER: booksuser
      DB_PASSWORD: bookspass
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    image: oskalibriary/books-frontend:latest
    container_name: books-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: